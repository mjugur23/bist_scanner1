name: BIST Scanner

on:
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Repo cek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Kütüphaneleri kur
        # Kütüphaneleri tek tek yazmak yerine, güncellediğin txt dosyasından okutuyoruz
        run: |
          pip install -r requirements.txt

      - name: Ana Tarayıcıyı Çalıştır (Scanner)
        # Eğer ana kodunda Telegram token'ı gizli değilse bu env bloğu zarar vermez, gizliyse çalışmasını sağlar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python scanner.py

      - name: Düşen Kırılım Taramasını Çalıştır
        # Yeni eklediğin kodun Telegram mesajı atabilmesi için bu şifreyi veriyoruz
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: |
          python dusen_kirilimi.py

      - name: Hafızayı Kaydet (Commit)
        # Sadece hafiza.json'u değil, değişen tüm json dosyalarını kaydetmesi için 'git add .' yaptık
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Hafiza guncellendi" || echo "Degisiklik yok"
          git push
