name: BIST Scanner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-scanner:

    runs-on: ubuntu-latest

    steps:

      - name: Repo cek
        uses: actions/checkout@v3

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Kütüphaneleri kur
        run: |
          pip install pandas numpy requests websocket-client tvdatafeed

      - name: Scanner çalıştır
        run: |
          python scanner.py
